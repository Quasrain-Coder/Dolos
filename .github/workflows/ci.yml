name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest server/tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Verify app imports (catches missing deps)
        run: |
          python -c "from server.main import app; print('App loaded OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}
