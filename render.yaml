services:
  - type: web
    name: dolos
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd client && npm install && npm run build && cd ..
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOW_ORIGINS
        value: "*"
